<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TAG Enterprises LLC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #020812;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      display: flex;
      justify-content: center;
      background: #020812;
    }

    .main-wrap {
      position: relative;
      width: min(100%, 1024px);
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .hotspot {
      position: absolute;
      display: block;
      cursor: pointer;
      background: rgba(255,255,255,0);
      border: none;
      text-decoration: none;
    }

    .hotspot:focus-visible {
      outline: 3px solid #58a6ff;
      border-radius: 8px;
    }

    /* Top navigation buttons */
    .btn-games {
      left: 14.1%;
      top: 9.7%;
      width: 11.7%;
      height: 2.7%;
    }

    .btn-backgrounds {
      left: 25.7%;
      top: 9.7%;
      width: 19.5%;
      height: 2.7%;
    }

    .btn-support {
      left: 45.3%;
      top: 9.7%;
      width: 14.6%;
      height: 2.7%;
    }

    .btn-privacy {
      left: 60.0%;
      top: 9.7%;
      width: 14.3%;
      height: 2.7%;
    }

    .btn-contact {
      left: 74.3%;
      top: 9.7%;
      width: 15.5%;
      height: 2.7%;
    }

    /* Main action buttons */
    .btn-view-games {
      left: 27.4%;
      top: 14.1%;
      width: 18.7%;
      height: 3.0%;
    }

    .btn-music {
      left: 47.7%;
      top: 14.1%;
      width: 20.2%;
      height: 3.0%;
    }

    /* Background thumbnail buttons */
    .bg-desert {
      left: 8.6%;
      top: 24.6%;
      width: 12.2%;
      height: 5.6%;
    }

    .bg-coral {
      left: 22.1%;
      top: 24.6%;
      width: 12.2%;
      height: 5.6%;
    }

    .bg-space {
      left: 35.6%;
      top: 24.6%;
      width: 12.2%;
      height: 5.6%;
    }

    .bg-waterfall {
      left: 49.1%;
      top: 24.6%;
      width: 12.2%;
      height: 5.6%;
    }

    .bg-wildflowers {
      left: 62.5%;
      top: 24.6%;
      width: 12.2%;
      height: 5.6%;
    }

    .bg-winter {
      left: 76.0%;
      top: 24.6%;
      width: 12.2%;
      height: 5.6%;
    }

    .music-status {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      max-width: 92vw;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      color: #d8ecff;
      font-weight: 700;
      font-size: 0.95rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.45);
      text-align: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,0.68);
    }

    .modal-backdrop.visible {
      display: flex;
    }

    .modal {
      width: min(680px, 94vw);
      max-height: 86vh;
      overflow-y: auto;
      padding: 28px;
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(12,25,43,0.97), rgba(5,12,23,0.96));
      border: 1px solid rgba(120,170,230,0.34);
      box-shadow: 0 18px 46px rgba(0,0,0,0.62);
      color: #f0f6ff;
      line-height: 1.65;
    }

    .modal h2 {
      color: #58a6ff;
      margin-bottom: 16px;
      text-shadow: 0 0 12px rgba(31,111,235,0.65);
    }

    .modal a {
      color: #8ecbff;
      font-weight: 800;
    }

    .modal-close {
      margin-top: 22px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #1683ef, #0d58b9);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 18px 10px 26px;
      color: #dce8f6;
      font-size: 0.95rem;
      background: #020812;
    }

    @media (max-width: 700px) {
      .main-wrap {
        width: 100%;
      }

      .music-status {
        font-size: 0.82rem;
      }
    }
  </style>
</head>

<body>

<audio id="bg-music"></audio>

<div class="page">
  <main class="main-wrap" id="top">
    <img
      class="main-image"
      src="images/main_web.png"
      alt="TAG Enterprises LLC Website Main Screen"
    />

    <a class="hotspot btn-games" href="#games-area" title="Games"></a>
    <a class="hotspot btn-backgrounds" href="#background-area" title="Backgrounds"></a>
    <button class="hotspot btn-support" onclick="openModal('support')" title="Support"></button>
    <button class="hotspot btn-privacy" onclick="openModal('privacy')" title="Privacy"></button>
    <button class="hotspot btn-contact" onclick="openModal('contact')" title="Contact"></button>

    <a class="hotspot btn-view-games" href="#games-area" title="View Our Games"></a>
    <button class="hotspot btn-music" onclick="toggleMusic()" title="Play / Pause Music"></button>

    <button class="hotspot bg-desert" onclick="setSiteBackground('images/desert_sunset_panorama.png')" title="Desert Background"></button>
    <button class="hotspot bg-coral" onclick="setSiteBackground('images/coral_reef_panorama.png')" title="Coral Reef Background"></button>
    <button class="hotspot bg-space" onclick="setSiteBackground('images/space_planets_panorama.png')" title="Space Background"></button>
    <button class="hotspot bg-waterfall" onclick="setSiteBackground('images/waterfall_cliffs_panorama.png')" title="Waterfall Background"></button>
    <button class="hotspot bg-wildflowers" onclick="setSiteBackground('images/wildflowers_panorama.png')" title="Wildflowers Background"></button>
    <button class="hotspot bg-winter" onclick="setSiteBackground('images/winter_forest_panorama.png')" title="Winter Forest Background"></button>

    <div id="background-area" style="position:absolute; top:21%; left:0;"></div>
    <div id="games-area" style="position:absolute; top:33%; left:0;"></div>
  </main>
</div>

<div id="music-status" class="music-status">Music is off</div>

<div id="modal-backdrop" class="modal-backdrop" onclick="closeModalFromBackdrop(event)">
  <div class="modal">
    <div id="modal-content"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<footer>
  © 2026 TAG Enterprises LLC. All rights reserved.
</footer>

<script>
  const music = document.getElementById("bg-music");
  const musicStatus = document.getElementById("music-status");
  const modalBackdrop = document.getElementById("modal-backdrop");
  const modalContent = document.getElementById("modal-content");

  const tracks = [
    "audio/bg_track_2.mp3",
    "audio/bg_track_3.mp3",
    "audio/bg_track_4.mp3",
    "audio/bg_track_5.mp3",
    "audio/bg_track_6.mp3",
    "audio/bg_track_7.mp3",
    "audio/bg_track_8.mp3",
    "audio/bg_track_9.mp3"
  ];

  let shuffledTracks = [];
  let currentIndex = 0;
  let initialized = false;
  let currentTrackName = "";

  function shuffleArray(array) {
    const copy = [...array];

    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }

    return copy;
  }

  function buildPlaylist() {
    const previousTrack = currentTrackName;
    shuffledTracks = shuffleArray(tracks);

    if (
      previousTrack &&
      shuffledTracks.length > 1 &&
      shuffledTracks[0] === previousTrack
    ) {
      const swapIndex =
        Math.floor(Math.random() * (shuffledTracks.length - 1)) + 1;

      [shuffledTracks[0], shuffledTracks[swapIndex]] =
        [shuffledTracks[swapIndex], shuffledTracks[0]];
    }

    currentIndex = 0;
  }

  function getTrackLabel(trackPath) {
    return trackPath
      .replace("audio/", "")
      .replace(".mp3", "")
      .replace(/_/g, " ")
      .toUpperCase();
  }

  function showMusicStatus(text) {
    musicStatus.textContent = text;
    musicStatus.style.display = "block";
  }

  function playCurrentTrack() {
    if (currentIndex >= shuffledTracks.length) {
      buildPlaylist();
    }

    currentTrackName = shuffledTracks[currentIndex];

    music.src = currentTrackName;
    music.volume = 0.30;

    music.play()
      .then(() => {
        showMusicStatus("♫ Playing: " + getTrackLabel(currentTrackName));
      })
      .catch(() => {
        showMusicStatus("Click Play / Pause Music to start music");
      });
  }

  function toggleMusic() {
    if (!initialized) {
      buildPlaylist();
      playCurrentTrack();
      initialized = true;
      return;
    }

    if (music.paused) {
      music.play()
        .then(() => {
          showMusicStatus("♫ Playing: " + getTrackLabel(currentTrackName));
        })
        .catch(() => {
          showMusicStatus("Click Play / Pause Music to start music");
        });
    } else {
      music.pause();
      showMusicStatus("Music paused");
    }
  }

  music.addEventListener("ended", () => {
    currentIndex++;
    playCurrentTrack();
  });

  function setSiteBackground(imagePath) {
    document.body.style.backgroundImage =
      'linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.55)), url("' +
      imagePath +
      '")';

    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    document.body.style.backgroundRepeat = "no-repeat";
    document.body.style.backgroundAttachment = "fixed";

    localStorage.setItem("selectedBackground", imagePath);
  }

  function loadSavedBackground() {
    const savedBackground = localStorage.getItem("selectedBackground");

    if (savedBackground) {
      setSiteBackground(savedBackground);
    }
  }

  function openModal(type) {
    if (type === "support") {
      modalContent.innerHTML =
        "<h2>Support</h2>" +
        "<p>If you experience issues with any TAG Enterprises LLC game, please contact support and include your device model, Android version, screenshots if available, and a description of the issue.</p>" +
        "<br/>" +
        "<p>Support Email:<br/><a href='mailto:support@tagenterprisesapps.com'>support@tagenterprisesapps.com</a></p>";
    }

    if (type === "privacy") {
      modalContent.innerHTML =
        "<h2>Privacy</h2>" +
        "<p>TAG Enterprises LLC respects your privacy.</p>" +
        "<br/>" +
        "<p>Our applications may use third-party services such as advertising, analytics, or platform services provided by Google Play.</p>" +
        "<br/>" +
        "<p>We do not knowingly collect personally identifiable information except where required for application functionality, support, or legal compliance.</p>" +
        "<br/>" +
        "<p>Additional privacy policy updates may be published as applications evolve and new services are integrated.</p>";
    }

    if (type === "contact") {
      modalContent.innerHTML =
        "<h2>Contact</h2>" +
        "<p>TAG Enterprises LLC</p>" +
        "<br/>" +
        "<p>General Inquiries:<br/><a href='mailto:contact@tagenterprisesapps.com'>contact@tagenterprisesapps.com</a></p>" +
        "<br/>" +
        "<p>Business and Media:<br/><a href='mailto:business@tagenterprisesapps.com'>business@tagenterprisesapps.com</a></p>";
    }

    modalBackdrop.classList.add("visible");
  }

  function closeModal() {
    modalBackdrop.classList.remove("visible");
  }

  function closeModalFromBackdrop(event) {
    if (event.target === modalBackdrop) {
      closeModal();
    }
  }

  document.addEventListener("keydown", function(event) {
    if (event.key === "Escape") {
      closeModal();
    }
  });

  loadSavedBackground();
</script>

</body>
</html>
