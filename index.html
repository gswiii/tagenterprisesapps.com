<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TAG Enterprises LLC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050b14;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .main-screen-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background:
        radial-gradient(circle at top, rgba(31,111,235,0.18), transparent 45%),
        linear-gradient(180deg, #050b14 0%, #07111f 100%);
    }

    .main-screen-image {
      width: 100%;
      max-width: 1280px;
      height: auto;
      display: block;
    }

    .fallback {
      padding: 40px 20px;
      text-align: center;
      color: #cfd9e6;
    }

    footer {
      text-align: center;
      padding: 24px 12px;
      color: #c7d0df;
      background: #050b14;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .main-screen-wrapper {
        align-items: flex-start;
      }

      .main-screen-image {
        width: 100%;
        max-width: none;
      }
    }
  </style>
</head>

<body>

  <main class="main-screen-wrapper">
    <img
      class="main-screen-image"
      src="images/website_main_screen.png"
      alt="TAG Enterprises LLC website main screen"
    />
  </main>

  <footer>
    © 2026 TAG Enterprises LLC. All rights reserved.
  </footer>

</body>
</html>
