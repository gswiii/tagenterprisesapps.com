<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TAG Enterprises LLC</title>
  <link rel="icon" href="data:," />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
    }

    body {
      background-image: url("./images/desert_sunset_panorama.png?v=20260512-clean-1");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .main-wrap {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .main-image {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .hotspot {
      position: absolute;
      z-index: 10;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: transparent;
      font-size: 0;
      line-height: 0;
    }

    .hotspot:focus {
      outline: 3px solid rgba(255,255,255,0.85);
      outline-offset: 2px;
    }

    /*
      Invisible clickable areas over main_web.png.
      These percentages may need slight adjustment depending on the exact
      button locations inside your image.
    */

    .music {
      left: 43%;
      top: 9%;
      width: 14%;
      height: 6%;
    }

    .coral {
      left: 5%;
      top: 15%;
      width: 13%;
      height: 7%;
    }

    .desert {
      left: 19%;
      top: 15%;
      width: 15%;
      height: 7%;
    }

    .space {
      left: 35%;
      top: 15%;
      width: 15%;
      height: 7%;
    }

    .waterfall {
      left: 51%;
      top: 15%;
      width: 18%;
      height: 7%;
    }

    .wildflowers {
      left: 70%;
      top: 15%;
      width: 13%;
      height: 7%;
    }

    .winter {
      left: 84%;
      top: 15%;
      width: 12%;
      height: 7%;
    }
  </style>
</head>

<body>
  <audio id="backgroundMusic" loop preload="auto">
    <source src="./audio/background_music.mp3" type="audio/mpeg" />
    <source src="./audio/bg_track_1.mp3" type="audio/mpeg" />
  </audio>

  <main class="page">
    <div class="main-wrap">
      <img
        class="main-image"
        src="./images/main_web.png?v=20260512-clean-1"
        alt="TAG Enterprises LLC"
      />

      <button
        class="hotspot music"
        type="button"
        aria-label="Start or pause music"
        onclick="toggleMusic()">
      </button>

      <button
        class="hotspot coral"
        type="button"
        aria-label="Coral Reef background"
        onclick="setBackground('./images/coral_reef_panorama.png')">
      </button>

      <button
        class="hotspot desert"
        type="button"
        aria-label="Desert Sunset background"
        onclick="setBackground('./images/desert_sunset_panorama.png')">
      </button>

      <button
        class="hotspot space"
        type="button"
        aria-label="Space Planets background"
        onclick="setBackground('./images/space_planets_panorama.png')">
      </button>

      <button
        class="hotspot waterfall"
        type="button"
        aria-label="Waterfall Cliffs background"
        onclick="setBackground('./images/waterfall_cliffs_panorama.png')">
      </button>

      <button
        class="hotspot wildflowers"
        type="button"
        aria-label="Wildflowers background"
        onclick="setBackground('./images/wildflowers_panorama.png')">
      </button>

      <button
        class="hotspot winter"
        type="button"
        aria-label="Winter Forest background"
        onclick="setBackground('./images/winter_forest_panorama.png')">
      </button>
    </div>
  </main>

  <script>
    function setBackground(imagePath) {
      const cacheBuster = new Date().getTime();

      document.body.style.backgroundImage =
        'url("' + imagePath + '?v=' + cacheBuster + '")';
    }

    function toggleMusic() {
      const music = document.getElementById("backgroundMusic");

      if (music.paused) {
        music.volume = 0.35;
        music.play().catch(function () {
          console.log("Music could not play. Check the audio filename/path.");
        });
      } else {
        music.pause();
      }
    }
  </script>
</body>
</html>
